version: "3.9"
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: glowcycle_postgres
    environment:
      POSTGRES_DB: glowcycle
      POSTGRES_USER: glow
      POSTGRES_PASSWORD: glow123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: glowcycle_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  pgdata: